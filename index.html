<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pertemuan 1 - Bio Link Sopiyah</title>
    <meta name="description"
        content="Tugas Pertemuan 1: Halaman Bio Link Keren & Responsif untuk Portfolio dan Media Sosial.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* CSS Variables for Premium Dark/Neon Aesthetic */
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --card-hover-bg: rgba(255, 255, 255, 0.07);
            --card-hover-border: rgba(255, 255, 255, 0.2);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --primary-accent: #818cf8;
            --secondary-accent: #c084fc;
            --accent-glow: rgba(129, 140, 248, 0.3);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            overflow-x: hidden;
        }

        /* Background Animated Glows */
        .glow-orb {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.45;
            pointer-events: none;
        }

        .orb-1 {
            top: 10%;
            left: 20%;
            background: var(--primary-accent);
            animation: float 8s ease-in-out infinite;
        }

        .orb-2 {
            bottom: 15%;
            right: 15%;
            background: var(--secondary-accent);
            animation: float 12s ease-in-out infinite alternate;
        }

        @keyframes float {
            0% {
                transform: translateY(0px) scale(1);
            }

            50% {
                transform: translateY(-20px) scale(1.1);
            }

            100% {
                transform: translateY(0px) scale(1);
            }
        }

        /* Container & Card */
        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Profile Section */
        header {
            margin-bottom: 2rem;
        }

        .avatar-container {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 1.25rem;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: var(--transition);
        }

        .avatar-container::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            padding: 4px;
            background: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .avatar-container:hover .avatar {
            transform: scale(1.05) rotate(3deg);
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 40%, #e2e8f0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .tagline {
            font-size: 0.95rem;
            color: var(--text-secondary);
            font-weight: 400;
            line-height: 1.5;
            margin-bottom: 1.25rem;
        }

        /* Badge location */
        .location {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 0.35rem 0.85rem;
            border-radius: 50px;
            font-size: 0.8rem;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .location i {
            color: var(--primary-accent);
        }

        /* Links Navigation Section */
        nav {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.1rem 1.5rem;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .link-btn-content {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .link-btn-content i {
            font-size: 1.25rem;
            color: var(--primary-accent);
            transition: var(--transition);
        }

        .link-btn .arrow-icon {
            font-size: 0.9rem;
            opacity: 0.5;
            transition: var(--transition);
        }

        /* Link Button Hover effects */
        .link-btn:hover {
            background: var(--card-hover-bg);
            border-color: var(--card-hover-border);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(129, 140, 248, 0.15);
        }

        .link-btn:hover .link-btn-content i {
            color: var(--secondary-accent);
            transform: scale(1.15);
        }

        .link-btn:hover .arrow-icon {
            opacity: 1;
            transform: translateX(3px);
        }

        .link-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(255, 255, 255, 0.05),
                    transparent);
            transition: 0.5s;
        }

        .link-btn:hover::before {
            left: 100%;
        }

        /* Social Media Icons Box (Horizontal List) */
        .socials {
            display: flex;
            justify-content: center;
            gap: 1.25rem;
            margin-top: 1.5rem;
        }

        .social-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 50%;
            color: var(--text-primary);
            font-size: 1.2rem;
            text-decoration: none;
            transition: var(--transition);
        }

        .social-icon:hover {
            color: #ffffff;
            background: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent));
            border-color: transparent;
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 8px 20px var(--accent-glow);
        }

        /* Footer Section */
        footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        footer p {
            margin-bottom: 0.25rem;
        }

        footer a {
            color: var(--primary-accent);
            text-decoration: none;
            transition: var(--transition);
        }

        footer a:hover {
            color: var(--secondary-accent);
            text-decoration: underline;
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            body {
                padding: 1.5rem 0.75rem;
                justify-content: flex-start;
            }

            .container {
                padding: 2rem 1.25rem;
                border-radius: 20px;
                box-shadow: none;
                background: rgba(255, 255, 255, 0.02);
                border: 1px solid rgba(255, 255, 255, 0.05);
            }

            h1 {
                font-size: 1.5rem;
            }

            .link-btn {
                padding: 1rem 1.25rem;
            }
        }
    </style>
</head>
